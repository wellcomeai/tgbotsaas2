services:
  - type: web
    name: bot-factory-api
    env: python
    buildCommand: |
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      python scripts/check_config.py &&
      python scripts/migrate.py
    startCommand: python scripts/start.py
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: PROJECT_NAME
        value: "Telegram Bot Factory"
      - key: API_V1_PREFIX
        value: "/api/v1"
      - key: SECRET_KEY
        generateValue: true
      - key: MASTER_BOT_TOKEN
        sync: false  # Установите вручную в панели Render
      - key: DATABASE_URL
        fromDatabase:
          name: bot-factory-db
          property: connectionString
      - key: POSTGRES_SERVER
        fromDatabase:
          name: bot-factory-db
          property: host
      - key: POSTGRES_USER
        fromDatabase:
          name: bot-factory-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: bot-factory-db
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: bot-factory-db
          property: database
      - key: POSTGRES_PORT
        value: "5432"
      - key: LOG_LEVEL
        value: "INFO"
      - key: CELERY_BROKER_URL
        value: "redis://localhost:6379/0"
      - key: CELERY_RESULT_BACKEND
        value: "redis://localhost:6379/0"
      - key: BACKEND_CORS_ORIGINS
        value: "https://bot-factory-api.onrender.com,https://localhost:3000"

databases:
  - name: bot-factory-db
    databaseName: bot_factory
    user: bot_factory_user
